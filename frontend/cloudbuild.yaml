steps:
  # 1. Build the Docker image
  # NOTE the './frontend' at the end - this is the "Build Context"
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/aqtest-frontend', '-f', 'frontend/Dockerfile', '.']

  # 2. Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aqtest-frontend']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'aqtest-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aqtest-frontend'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
